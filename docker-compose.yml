# Local teaching stack for lectures 3-5.
# Profiles:
# - superset
# - airflow

x-ohuseire-lecture5-env: &ohuseire-lecture5-env
  OHUSEIRE_AIR_STATION_IDS: 4,8
  OHUSEIRE_POLLEN_STATION_IDS: 25
  OHUSEIRE_RAW_SCHEMA: l5_raw
  OHUSEIRE_MART_SCHEMA: l5_mart
  OHUSEIRE_MEASUREMENT_TABLE: ohuseire_measurement
  OHUSEIRE_INGESTION_AUDIT_TABLE: ohuseire_ingestion_audit
  OHUSEIRE_SCHEMA_SQL_PATH: /opt/airflow/sql/warehouse/l5_ohuseire_schema.sql
  OHUSEIRE_REFRESH_MART_DIMENSIONS: "false"
  DBT_SOURCE_RAW_SCHEMA: l5_raw
  DBT_TARGET_SCHEMA: l5_mart

x-superset-common: &superset-common
  image: course-superset-local
  pull_policy: never
  build:
    context: ./superset/image
    dockerfile: Dockerfile
  env_file:
    - .env
  environment: &superset-common-env
    SUPERSET_DB_HOST: postgres
    SUPERSET_DB_PORT: "5432"
  volumes: &superset-volumes
    - superset-home:/app/superset_home
    - type: bind
      source: ${HOST_WORKSPACE}/warehouse/files
      target: /warehouse-files
      bind:
        create_host_path: true
  depends_on:
    postgres:
      condition: service_healthy
  user: "0:0"

x-airflow-common: &airflow-common
  image: course-airflow-local
  pull_policy: never
  build:
    context: ./airflow/image
    dockerfile: Dockerfile
    args:
      AIRFLOW_UID: ${AIRFLOW_UID}
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    WAREHOUSE_DB_HOST: postgres
    WAREHOUSE_DB_PORT: "5432"
    <<: *ohuseire-lecture5-env
  volumes:
    - type: bind
      source: ${HOST_WORKSPACE}/airflow/dags
      target: /opt/airflow/dags
      bind:
        create_host_path: true
    - type: bind
      source: ${HOST_WORKSPACE}/dbt
      target: /opt/airflow/dbt
      bind:
        create_host_path: true
    - type: bind
      source: ${HOST_WORKSPACE}/etl
      target: /opt/airflow/etl
      read_only: true
      bind:
        create_host_path: true
    - type: bind
      source: ${HOST_WORKSPACE}/sql
      target: /opt/airflow/sql
      read_only: true
      bind:
        create_host_path: true
    - type: bind
      source: ${HOST_WORKSPACE}/warehouse/files
      target: /opt/airflow/warehouse-files
      bind:
        create_host_path: true
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    profiles:
      - superset
      - airflow
    image: pgduckdb/pgduckdb:16-v1.1.1
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_ADMIN_DB}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    ports:
      - ${WAREHOUSE_DB_PORT}:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - type: bind
        source: ${HOST_WORKSPACE}/postgres/init
        target: /docker-entrypoint-initdb.d
        read_only: true
      - type: bind
        source: ${HOST_WORKSPACE}/warehouse/files
        target: /warehouse-files
        bind:
          create_host_path: true
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_ADMIN_USER} -d ${POSTGRES_ADMIN_DB}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  superset-init:
    <<: *superset-common
    profiles:
      - superset
    command: bootstrap
    healthcheck:
      disable: true

  superset:
    <<: *superset-common
    profiles:
      - superset
    command: run-server
    ports:
      - ${SUPERSET_PORT}:8088
    depends_on:
      superset-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8088/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-init:
    <<: *airflow-common
    profiles:
      - airflow
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/logs
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      _AIRFLOW_WWW_USER_FIRSTNAME: Airflow
      _AIRFLOW_WWW_USER_LASTNAME: Admin
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
    user: "0:0"

  airflow-apiserver:
    <<: *airflow-common
    profiles:
      - airflow
    command: api-server
    ports:
      - ${AIRFLOW_PORT}:8080
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8080/api/v2/version
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    profiles:
      - airflow
    command: scheduler
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8974/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    profiles:
      - airflow
    command: dag-processor
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    profiles:
      - airflow
    command: triggerer
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  dbt-docs:
    <<: *airflow-common
    profiles:
      - dbt-docs
    depends_on: []
    command:
      - bash
      - -lc
      - |
        if [ ! -f /opt/airflow/dbt/target/index.html ]; then
          echo "dbt docs artifacts are missing. Run 'make dbt-docs' first." >&2
          exit 1
        fi
        cd /opt/airflow/dbt
        exec dbt docs serve --project-dir . --profiles-dir . --port 8081 --host 0.0.0.0 --no-browser
    ports:
      - ${DBT_DOCS_PORT:-8081}:8081
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8081/index.html
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  superset-home:
  postgres-data:
  airflow-logs:
